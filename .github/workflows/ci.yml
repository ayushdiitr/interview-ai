name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    server-and-admin:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: server/package-lock.json

            - name: Install and smoke-check server
              working-directory: server
              run: |
                  npm ci
                  node -e "const { createSqliteStore } = require('./lib/store-sqlite'); createSqliteStore(); console.log('store ok');"

            - name: Install and build React admin
              working-directory: admin-web
              run: |
                  npm install
                  npm run build

    desktop:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install root deps and run tests
              run: |
                  npm ci
                  npm test
